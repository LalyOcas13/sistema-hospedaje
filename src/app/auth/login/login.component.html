<div class="login-container">
  <div class="left-section">
    <div class="people-background"></div>
    <div class="form-overlay">
      <div class="login-card">
        <div class="logo-container">
          <img src="assets/logo.png" alt="Hospedaje LAY Logo" class="logo">
        </div>
        <h1 class="login-title">Iniciar Sesión</h1>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <div class="form-group">
            <label for="email" class="form-label">Correo Electrónico</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </span>
              <input 
                type="email" 
                id="email" 
                formControlName="email"
                class="form-input"
                placeholder="correo@ejemplo.com"
                [class.input-error]="email?.invalid && email?.touched"
              >
            </div>
            <div class="error-message" *ngIf="email?.invalid && email?.touched">
              <span *ngIf="email?.errors?.['required']">El correo es requerido</span>
              <span *ngIf="email?.errors?.['email']">Ingresa un correo válido</span>
            </div>
          </div>
          <div class="form-group">
            <label for="password" class="form-label">Contraseña</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
              </span>
              <input 
                [type]="showPassword ? 'text' : 'password'" 
                id="password" 
                formControlName="password"
                class="form-input"
                placeholder="••••••••"
                [class.input-error]="password?.invalid && password?.touched"
              >
              <button 
                type="button" 
                class="toggle-password"
                (click)="togglePasswordVisibility()"
                tabindex="-1"
              >
                <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
            <div class="error-message" *ngIf="password?.invalid && password?.touched">
              <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
              <span *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres</span>
            </div>
          </div>
          <div class="alert-error" *ngIf="errorMessage">
            {{ errorMessage }}
          </div>
          <div class="login-links">
            <a href="#" class="link-forgot" routerLink="/auth/forgot-password">¿Olvidaste tu contraseña?</a>
            <a href="#" class="link-register" routerLink="/auth/register">Registrarse</a>
          </div>
          <button 
            type="submit" 
            class="btn-login"
            [disabled]="loading"
          >
            <span *ngIf="!loading">Ingresar</span>
            <span *ngIf="loading" class="loading-spinner">
              <svg class="spinner" viewBox="0 0 50 50">
                <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
              </svg>
              Cargando...
            </span>
          </button>
        </form>
      </div>
    </div>
  </div>
  <div class="right-section">
    <div class="hotel-image"></div>
  </div>
</div>
