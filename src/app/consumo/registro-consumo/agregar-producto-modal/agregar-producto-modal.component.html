<div class="modal-overlay" *ngIf="isVisible">
  <div class="modal-container">
    <div class="modal-header">
      <h2>{{ isEditMode ? 'EDITAR PRODUCTO' : 'AGREGAR PRODUCTO' }}</h2>
      <button class="close-button" (click)="onCloseModal()">&times;</button>
    </div>
    <div class="modal-content">
      <form (ngSubmit)="onSaveProducto()">
        <div class="form-row">
          <!-- Columna Izquierda -->
          <div class="form-column">
            <div class="form-group">
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" [(ngModel)]="nuevoProducto.nombre" name="nombre" required>
            </div>
            <div class="form-group">
              <label for="precio">Precio</label>
              <input type="number" id="precio" [(ngModel)]="nuevoProducto.precio" name="precio" required>
            </div>
            <div class="form-group">
              <label for="estado">Estado</label>
              <select id="estado" [(ngModel)]="nuevoProducto.estado" name="estado" required>
                <option value="">Seleccionar estado</option>
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
                <option value="Pendiente">Pendiente</option>
                <option value="Agotado">Agotado</option>
              </select>
            </div>
          </div>
          <!-- Columna Derecha -->
          <div class="form-column">
            <div class="form-group">
              <label for="detalle">Detalle</label>
              <input type="text" id="detalle" [(ngModel)]="nuevoProducto.detalle" name="detalle" required>
            </div>
            <div class="form-group">
              <label for="cantidad">Cantidad</label>
              <input type="number" id="cantidad" [(ngModel)]="nuevoProducto.cantidad" name="cantidad" required>
            </div>
            <div class="form-group">
              <label for="codigoBarras">Código de Barras</label>
              <input type="text" id="codigoBarras" [(ngModel)]="nuevoProducto.codigoBarras" name="codigoBarras" placeholder="Opcional: 7501051234567">
            </div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-cancel" (click)="onCloseModal()">
        <i class="fas fa-times"></i> Cancelar
      </button>
      <button type="submit" class="btn btn-guardar" (click)="onSaveProducto()">
        <i class="fas fa-save"></i> Guardar
      </button>
    </div>
  </div>
</div>
