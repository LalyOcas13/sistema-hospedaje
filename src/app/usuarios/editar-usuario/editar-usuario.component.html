<!-- Modal Overlay -->
<div class="modal-overlay" *ngIf="isVisible" (click)="onOverlayClick($event)">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <!-- Header del Modal -->
    <div class="modal-header">
      <h2>Editar Usuario</h2>
      <button class="close-button" (click)="closeModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Contenido del Modal -->
    <div class="modal-content">
      <form [formGroup]="usuarioForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Nombre Completo</label>
            <input 
              type="text" 
              id="name" 
              formControlName="name"
              placeholder="Ingrese nombre completo"
              [class.is-invalid]="submitted && f['name'].errors"
            >
            <div class="invalid-feedback" *ngIf="submitted && f['name'].errors && f['name'].errors['required']">
              El nombre es requerido
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input 
              type="email" 
              id="email" 
              formControlName="email"
              placeholder="ejemplo@correo.com"
              [class.is-invalid]="submitted && f['email'].errors"
            >
            <div class="invalid-feedback" *ngIf="submitted && f['email'].errors && f['email'].errors['required']">
              El correo es requerido
            </div>
            <div class="invalid-feedback" *ngIf="submitted && f['email'].errors && f['email'].errors['email']">
              Formato de correo inválido
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="role">Rol</label>
            <select 
              id="role" 
              formControlName="role"
              [class.is-invalid]="submitted && f['role'].errors"
            >
              <option value="">Seleccionar rol</option>
              <option value="Administrador">Administrador</option>
              <option value="Recepcionista">Recepcionista</option>
              <option value="Empleado">Empleado</option>
            </select>
            <div class="invalid-feedback" *ngIf="submitted && f['role'].errors && f['role'].errors['required']">
              El rol es requerido
            </div>
          </div>
          
          <div class="form-group">
            <label for="status">Estado</label>
            <select 
              id="status" 
              formControlName="status"
              [class.is-invalid]="submitted && f['status'].errors"
            >
              <option value="">Seleccionar estado</option>
              <option value="Activo">Activo</option>
              <option value="Inactivo">Inactivo</option>
            </select>
            <div class="invalid-feedback" *ngIf="submitted && f['status'].errors && f['status'].errors['required']">
              El estado es requerido
            </div>
          </div>
        </div>
      </form>
    </div>

    <!-- Footer del Modal -->
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="closeModal()">
        <i class="fas fa-times"></i>
        Cancelar
      </button>
      <button type="button" class="btn btn-primary" (click)="onSubmit()" [disabled]="isLoading">
        <i class="fas fa-save" *ngIf="!isLoading"></i>
        <i class="fas fa-spinner fa-spin" *ngIf="isLoading"></i>
        {{ isLoading ? 'Actualizando...' : 'Actualizar Usuario' }}
      </button>
    </div>
  </div>
</div>
