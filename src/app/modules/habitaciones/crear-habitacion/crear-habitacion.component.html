<div class="crear-container">
  <!-- Header - Estilo Consumo -->
  <div class="header-crear">
    <h1 class="page-title">Crear Nueva Habitación</h1>
    <button class="btn-volver" (click)="volver()" style="margin-left: auto;">
      <i class="bx bx-arrow-back"></i>
      Volver
    </button>
  </div>

  <!-- Contenido del formulario - Estilo Consumo -->
  <div class="contenido-crear">
    <form class="formulario-crear" [formGroup]="habitacionForm" (ngSubmit)="guardarHabitacion()">
      <!-- Información Básica -->
      <div class="seccion-formulario">
        <h3>Información Básica</h3>
        <div class="form-grid">
          <div class="form-group">
            <label for="numero">Número de Habitación:</label>
            <input 
              type="text" 
              id="numero" 
              formControlName="numero"
              class="form-control"
              placeholder="Ej: 101, 201, 301">
            <small *ngIf="habitacionForm.get('numero')?.invalid && habitacionForm.get('numero')?.touched">
              El número es requerido
            </small>
          </div>

          <div class="form-group">
            <label for="tipo">Tipo de Habitación:</label>
            <select id="tipo" formControlName="tipo" class="form-control">
              <option value="">Seleccionar tipo</option>
              <option value="Simple">Simple</option>
              <option value="Doble">Doble</option>
              <option value="Individual">Individual</option>
            </select>
            <small *ngIf="habitacionForm.get('tipo')?.invalid && habitacionForm.get('tipo')?.touched">
              El tipo es requerido
            </small>
          </div>

          <div class="form-group">
            <label for="piso">Piso:</label>
            <select id="piso" formControlName="piso" class="form-control">
              <option value="">Seleccionar piso</option>
              <option value="1">Primer Piso</option>
              <option value="2">Segundo Piso</option>
              <option value="3">Tercer Piso</option>
              <option value="4">Cuarto Piso</option>
            </select>
            <small *ngIf="habitacionForm.get('piso')?.invalid && habitacionForm.get('piso')?.touched">
              El piso es requerido
            </small>
          </div>

          <div class="form-group">
            <label for="capacidad">Capacidad:</label>
            <input 
              type="number" 
              id="capacidad" 
              formControlName="capacidad"
              class="form-control"
              placeholder="Ej: 2, 4, 6"
              min="1"
              max="10">

            <small *ngIf="habitacionForm.get('capacidad')?.invalid && habitacionForm.get('capacidad')?.touched">
              La capacidad debe ser entre 1 y 10
            </small>
          </div>
        </div>
      </div>

      <!-- Detalles Adicionales -->
      <div class="seccion-formulario">
        <h3>Detalles Adicionales</h3>
        <div class="form-grid">
          <div class="form-group">
            <label for="precio">Precio por Noche:</label>
            <div class="input-group">
              <span class="input-prefix">$</span>
              <input 
                type="number" 
                id="precio" 
                formControlName="precio"
                class="form-control"
                placeholder="0.00"
                min="0"
                step="0.01">
            </div>
            <small *ngIf="habitacionForm.get('precio')?.invalid && habitacionForm.get('precio')?.touched">
              El precio es requerido y debe ser mayor a 0
            </small>
          </div>

          <div class="form-group">
            <label for="estado">Estado Inicial:</label>
            <select id="estado" formControlName="estado" class="form-control">
              <option value="disponible">Disponible</option>
              <option value="ocupada">Ocupada</option>
              <option value="reservada">Reservada</option>
               <option value="mantenimiento">Mantenimiento</option>
            </select>
          </div>

          <div class="form-group full-width">
            <label for="descripcion">Descripción:</label>
            <textarea 
              id="descripcion" 
              formControlName="descripcion"
              class="form-control"
              rows="3"
              placeholder="Ej: Tv, wifi, Ducha, Aire acondicionado..."></textarea>
          </div>
        </div>
      </div>

      <!-- Botones de Acción -->
      <div class="seccion-botones">
        <button type="button" class="btn-cancelar" (click)="volver()">
          CANCELAR
        </button>
        <button type="submit" class="btn-crear" [disabled]="habitacionForm.invalid">
          <i class="bx bx-save"></i>
          GUARDAR HABITACIÓN
        </button>
      </div>
    </form>
  </div>
</div>
